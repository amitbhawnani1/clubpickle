name: Pickleball Court Booking

# Triggered on-demand via workflow_dispatch by:
#   - The Swiss EC2 cron (primary — precise to ~1-2s of 23:58 UTC)
#   - Manual runs via `gh workflow run` or the GitHub UI
# Local launchd on the Mac runs the booking script directly and is the
# local primary; this workflow is the always-on redundant layer.
# Double-booking is prevented by the `club_get_my_bookings` API check.

on:
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Force a specific day: friday, saturday, sunday, holiday (comma-separated for multiple)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write accounts file from secret
        run: echo '${{ secrets.PICKLEBALL_ACCOUNTS }}' > pickleball_accounts.json

      - name: Determine bookings to run
        id: plan
        run: |
          # Compute the TARGET booking date once in IST, and share it with
          # all subsequent booking steps. This avoids per-step recomputation
          # which could drift across a midnight IST boundary.
          TARGET=$(TZ=Asia/Kolkata python3 -c "from datetime import date, timedelta; print((date.today() + timedelta(days=8)).isoformat())")
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Booking target date (IST today + 8): $TARGET"

          # If manual trigger with override, use that
          if [ -n "${{ inputs.day_override }}" ]; then
            echo "jobs=${{ inputs.day_override }}" >> "$GITHUB_OUTPUT"
            echo "Manual override: ${{ inputs.day_override }}"
            exit 0
          fi

          # Get current day of week in IST (UTC+5:30)
          IST_DAY=$(TZ=Asia/Kolkata date +%A)
          echo "IST day: $IST_DAY"

          JOBS="holiday"  # Always run holiday check

          case "$IST_DAY" in
            Thursday)  JOBS="friday,$JOBS" ;;
            Friday)    JOBS="saturday,padel-sat,$JOBS" ;;
            Saturday)  JOBS="sunday,padel-sun,$JOBS" ;;
          esac

          echo "jobs=$JOBS" >> "$GITHUB_OUTPUT"
          echo "Will run: $JOBS"

      # ── Friday booking (Amit primary, 18:00-19:00) ──
      - name: Book Friday
        if: contains(steps.plan.outputs.jobs, 'friday')
        run: |
          python book_pickleball_api.py \
            --account amit --date "${{ steps.plan.outputs.target }}" \
            --slots 18:00 18:30 19:00 \
            --court 3 \
            --fallback-player khyati \
            --fallback-account khyati zaheer annika \
            --confirm --retries 8 --retry-gap 30

      # ── Saturday booking (Khyati primary, 17:00-18:30 = 5:00-6:30 PM) ──
      - name: Book Saturday
        if: contains(steps.plan.outputs.jobs, 'saturday')
        run: |
          python book_pickleball_api.py \
            --account khyati --date "${{ steps.plan.outputs.target }}" \
            --slots 17:00 17:30 18:00 \
            --court 3 \
            --fallback-player amit \
            --fallback-account amit zaheer annika \
            --confirm --retries 8 --retry-gap 30

      # ── Sunday booking (Amit primary, 17:00-18:30 = 5:00-6:30 PM) ──
      - name: Book Sunday
        if: contains(steps.plan.outputs.jobs, 'sunday')
        run: |
          python book_pickleball_api.py \
            --account amit --date "${{ steps.plan.outputs.target }}" \
            --slots 17:00 17:30 18:00 \
            --court 3 \
            --fallback-player khyati \
            --fallback-account khyati zaheer annika \
            --confirm --retries 8 --retry-gap 30

      # ── Padel Saturday booking ──
      # Priority: 5:00-6:00 PM (preferred), 5:30-6:30 PM, then any 30-min slot.
      - name: Book Padel Saturday
        if: contains(steps.plan.outputs.jobs, 'padel-sat')
        run: |
          python book_pickleball_api.py \
            --game padel \
            --account khyati --date "${{ steps.plan.outputs.target }}" \
            --slot-pref "17:00,17:30" "17:30,18:00" "17:00" "17:30" "18:00" \
            --court 1 \
            --fallback-player annika \
            --fallback-account annika amit zaheer \
            --confirm --retries 8 --retry-gap 30

      # ── Padel Sunday booking ──
      # Priority: 5:30-6:30 PM, then 5:00-6:00 PM, then any single 30-min slot.
      - name: Book Padel Sunday
        if: contains(steps.plan.outputs.jobs, 'padel-sun')
        run: |
          python book_pickleball_api.py \
            --game padel \
            --account khyati --date "${{ steps.plan.outputs.target }}" \
            --slot-pref "17:30,18:00" "17:00,17:30" "17:00" "17:30" "18:00" \
            --court 1 \
            --fallback-player annika \
            --fallback-account annika amit zaheer \
            --confirm --retries 8 --retry-gap 30

      # ── Holiday check (runs daily, exits silently if not a holiday) ──
      - name: Check and book holidays
        if: contains(steps.plan.outputs.jobs, 'holiday')
        env:
          TARGET: ${{ steps.plan.outputs.target }}
        run: |
          # Use the shared TARGET from the plan step — do NOT recompute here,
          # to eliminate any chance of drift across a midnight-IST boundary.
          echo "Holiday check for: $TARGET"

          HOLIDAY_NAME=$(python3 -c "
          import json, os
          target = os.environ['TARGET']
          holidays = json.load(open('pickleball_holidays.json'))['holidays']
          match = [h for h in holidays if h['date'] == target]
          print(match[0]['name'] if match else '')
          ")

          if [ -z "$HOLIDAY_NAME" ]; then
            echo "$TARGET is not a holiday — skipping"
            exit 0
          fi

          echo "HOLIDAY: $HOLIDAY_NAME on $TARGET — booking!"
          python book_pickleball_api.py \
            --account khyati --date "$TARGET" \
            --slots 17:30 18:00 \
            --court 3 \
            --fallback-player amit \
            --fallback-account amit zaheer annika \
            --confirm --retries 8 --retry-gap 30

      - name: Cleanup accounts file
        if: always()
        run: rm -f pickleball_accounts.json
